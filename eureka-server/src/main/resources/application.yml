server:
  port: 8761   # Standard Eureka port — don't change this

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
  # Eureka server should NOT register itself as a client
    register-with-eureka: false
    # Eureka server does NOT need to fetch registry from itself
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
   # Wait time before evicting unregistered services (ms)
    wait-time-in-ms-between-sync-retries: 3000

# Show full details in the Eureka dashboard
management:
  endpoints:
    web:
      exposure:
        include: "*"