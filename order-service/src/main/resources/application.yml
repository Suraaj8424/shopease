server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders_db
    username: ${DB_USERNAME:postgres}     # ← change to your PostgreSQL username
    password: ${DB_PASSWORD:yourpassword}  # ← change to your PostgreSQL password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT config — keep the secret long (256-bit minimum for HS256)
jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# OpenFeign — use Eureka service name, not hardcoded URL
product-service:
  url: http://product-service

logging:
  level:
    com.ecommerce: DEBUG